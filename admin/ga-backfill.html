<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GA Backfill</title>
<meta name="robots" content="noindex,nofollow">
<style>
  body{font-family:sans-serif;max-width:480px;margin:2rem auto;padding:1rem;background:#f5f0e8}
  h2{font-size:1.1rem;margin-bottom:.5rem}
  .info{font-size:.85rem;color:#555;margin-bottom:1.5rem}
  button{background:#2d6a4f;color:#fff;border:none;padding:.9rem 2rem;border-radius:8px;font-size:1rem;cursor:pointer;width:100%}
  button:disabled{background:#aaa}
  #status{margin-top:1rem;font-size:.9rem;font-weight:600}
</style>
</head>
<body>
<h2>GA4 Backfill – Davorin Fašmon</h2>
<div class="info">
  Naročilo: RF23E7E5F674015E<br>
  Datum: 29. 5. 2026 14:34<br>
  Artikli: Resasti bradovec Alkoholna ×6<br>
  Skupaj: <b>162,69 €</b>
</div>
<button id="btn" onclick="send()">Pošlji v GA4</button>
<div id="status"></div>
<script>
async function send() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Pošiljam…';
  try {
    const r = await fetch(
      'https://www.google-analytics.com/mp/collect?measurement_id=G-L2PGE7VDHB&api_secret=SUGRHUnNQMOu353IPXmFQw',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          client_id: 'srv.1780065298000000',
          timestamp_micros: 1780065298000000,
          events: [{
            name: 'purchase',
            params: {
              transaction_id: 'e7e5f674-015e-41',
              currency: 'EUR',
              value: 162.69,
              shipping: 0,
              discount: 28.71,
              coupon: 'Max',
              items: [{
                item_id: 'LM-ALC-50',
                item_name: 'Resasti bradovec',
                item_variant: 'Alkoholna',
                item_category: 'Tinkture',
                price: 31.9,
                quantity: 6,
                index: 0
              }]
            }
          }]
        })
      }
    );
    if (r.status === 204 || r.ok) {
      status.style.color = 'green';
      status.textContent = '✅ Uspelo! Event poslan v GA4.';
      btn.textContent = 'Poslano';
    } else {
      throw new Error('Status ' + r.status);
    }
  } catch(e) {
    status.style.color = 'red';
    status.textContent = '❌ Napaka: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Poskusi znova';
  }
}
</script>
</body>
</html>
