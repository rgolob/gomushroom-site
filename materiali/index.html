<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Materiali">
<meta name="theme-color" content="#1a1209">
<meta name="robots" content="noindex,nofollow">
<title>GoMushroom · Materiali</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%231a1209'/%3E%3Ctext x='256' y='340' font-size='300' text-anchor='middle'%3E🌿%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1209;--cream:#f5f0e8;--parchment:#ede6d6;
  --accent:#af8455;--accent-dark:#8a6338;
  --muted:#7a6f60;--danger:#8b3a2a;--success:#3a6b4a;
  --border:rgba(175,132,85,0.22);--shadow:0 2px 16px rgba(26,18,9,0.09);
  --sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
}
html{height:100%}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100%;overscroll-behavior:none}
.app-header{background:var(--ink);color:var(--cream);padding:.35rem .5rem;display:flex;align-items:center;justify-content:flex-end;position:fixed;top:0;left:0;right:0;z-index:100;gap:.3rem;padding-top:calc(.35rem + var(--sat))}
.hbtn{background:rgba(175,132,85,.18);border:1px solid rgba(175,132,85,.35);color:var(--cream);font-family:'Jost',sans-serif;font-size:.58rem;font-weight:500;letter-spacing:.03em;text-transform:uppercase;padding:.28rem .45rem;border-radius:14px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block}
.hbtn:active{background:rgba(175,132,85,.35)}
.app-title{flex:1;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--accent);padding-left:.25rem;letter-spacing:.02em}
.content{padding:calc(44px + var(--sat) + 1.25rem) 1rem 2rem}
.section-title{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.card{background:white;border:1px solid var(--border);border-radius:14px;padding:1.1rem;margin-bottom:.75rem}
.placeholder{text-align:center;padding:3rem 1rem;color:var(--muted)}
.placeholder .icon{font-size:2.5rem;margin-bottom:.75rem}
.placeholder p{font-size:.85rem;line-height:1.6}
</style>
</head>
<body>

<header class="app-header">
  <span class="app-title">🌿 Materiali</span>
  <a href="/zaloga/" class="hbtn">📦 Zaloga</a>
</header>

<main class="content">
  <div class="placeholder">
    <div class="icon">🌿</div>
    <p>Aplikacija za upravljanje<br>surovin in materialov</p>
  </div>
</main>

</body>
</html>
