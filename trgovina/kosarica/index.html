<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Košarica | GoMushroom</title>
  <meta name="robots" content="noindex,follow"/>
  <link rel="icon" href="/assets/favicon-16.png" sizes="16x16" type="image/png"/>
  <link rel="apple-touch-icon" href="/assets/favicon-180.png"/>
  <link rel="stylesheet" href="/css/site.css"/>
  <link rel="stylesheet" href="/trgovina/css/trgovina.css"/>
  <style>
    .gm-cart-item {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 1rem;
      padding: 1rem;
      border: 1px solid rgba(43,11,57,.08);
      border-radius: 16px;
      background: white;
      align-items: center;
    }
    .gm-cart-item__image { width: 72px; height: 72px; flex-shrink: 0; }
    .gm-cart-item__controls { display: flex; flex-direction: column; align-items: flex-end; gap: .3rem; }
    @media(max-width:480px) {
      .gm-cart-item { grid-template-columns: 56px 1fr; }
      .gm-cart-item__controls { grid-column: 1/-1; flex-direction: row; align-items: center; justify-content: space-between; }
    }
  </style>
</head>
<body>
  <header id="site-header">
    <div class="wrap nav">
      <div class="brand">
        <a href="https://gomushroom.si/" aria-label="GoMushroom domov">
          <img src="https://gomushroom.si/assets/logo-horizontal.webp" alt="GoMushroom">
        </a>
      </div>
      <nav id="primary-nav" aria-label="Glavna navigacija">
        <a href="https://gomushroom.si/#services">Storitve</a>
        <a href="https://gomushroom.si/#approach">Pristop</a>
        <a href="https://gomushroom.si/#about">O nas</a>
        <a href="https://gomushroom.si/#gallery">Galerija</a>
        <a href="https://gomushroom.si/#references">Reference</a>
        <a href="https://gomushroom.si/trgovina/">Trgovina</a>
      </nav>
      <div class="nav-actions">
        <a class="shop-cart-link" href="/trgovina/kosarica/" aria-label="Košarica">
          Košarica <span class="gm-cart-badge" data-cart-count></span>
        </a>
        <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Meni" aria-expanded="false" aria-controls="primary-nav">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zM4 11h16v2H4zM4 16h16v2H4z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="shop-page">
      <div class="wrap">
        <div class="shop-head" style="text-align:left;margin:0 0 1.5rem">
          <p class="shop-kicker">GoMushroom • Košarica</p>
          <h1 class="shop-title" style="margin-bottom:.5rem">Košarica</h1>
        </div>

        <div class="gm-cart-page">
          <!-- Artikli -->
          <div>
            <div id="cart-items" class="gm-cart-items" aria-live="polite" style="display:flex;flex-direction:column;gap:.75rem"></div>
            <a href="/trgovina/" style="display:inline-flex;align-items:center;gap:.4rem;margin-top:1.25rem;color:rgba(43,11,57,.5);font-size:.82rem;text-decoration:none">
              ← Nadaljuj z nakupom
            </a>
          </div>

          <!-- Povzetek -->
          <aside class="gm-cart-summary">
            <!-- Kupon -->
            <div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(43,11,57,.08)">
              <div style="font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(43,11,57,.4);margin-bottom:.5rem">Kupon koda</div>
              <div style="display:flex;gap:.4rem">
                <input id="kupon-input" type="text" placeholder="npr. WELCOME10"
                  style="flex:1;padding:.5rem .75rem;border:1px solid rgba(43,11,57,.15);border-radius:10px;font-family:inherit;font-size:.85rem;text-transform:uppercase;outline:none;transition:border-color .2s">
                <button id="kupon-btn" type="button"
                  style="padding:.5rem .85rem;border:1px solid rgba(43,11,57,.15);border-radius:10px;background:white;font-family:inherit;font-size:.82rem;cursor:pointer;white-space:nowrap;transition:.2s">
                  Uveljavi
                </button>
              </div>
            </div>

            <!-- Seštevek -->
            <div id="cart-summary-detail"></div>

            <!-- Gumb -->
            <button class="gm-btn gm-btn--primary" type="button" id="checkout-btn"
              style="width:100%;margin-top:1rem;min-height:48px;font-size:.95rem">
              Na blagajno →
            </button>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const navToggle = document.getElementById('nav-toggle');
    const siteHeader = document.getElementById('site-header');
    if (navToggle && siteHeader) {
      navToggle.addEventListener('click', () => {
        const expanded = navToggle.getAttribute('aria-expanded') === 'true';
        navToggle.setAttribute('aria-expanded', String(!expanded));
        siteHeader.classList.toggle('nav-open');
      });
    }
  </script>  
  <script src="/trgovina/js/cart-page.js"></script>
   <script src="/trgovina/js/cart.js"></script>
  <script defer src="/js/site-footer.js"></script>
</body>
</html>
